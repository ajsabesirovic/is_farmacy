[phases.setup]
nixPkgs = ["php82", "php82Extensions.pdo_mysql", "php82Extensions.mbstring", "php82Extensions.xml", "php82Extensions.dom", "php82Extensions.curl", "php82Extensions.fileinfo", "php82Extensions.tokenizer", "php82Extensions.ctype", "php82Extensions.openssl"]

[phases.install]
cmds = ["composer install --no-dev --optimize-autoloader --ignore-platform-reqs"]

[start]
cmd = "php artisan serve --host=0.0.0.0 --port=${PORT:-8080}"
